<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GPRTool Demo</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="styles.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "./js/three.module.js"
    }
  }
  </script>

  <style>
    /* index.html inline styles — layout rules live in styles.css */
    #three-canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>

<body>
  <div id="header-container"></div>
  <div id="body-container"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from './js/OrbitControls.js';

    /* ============================================================
       LOAD HEADER + BODY
    ============================================================ */
    const header = await fetch('header.html').then(r => r.text());
    document.getElementById('header-container').innerHTML = header;

    const bodyHTML = await fetch('body.html').then(r => r.text());
    document.getElementById('body-container').innerHTML = bodyHTML;

    /* ============================================================
       HEADER: CLOCK
    ============================================================ */
    function updateHeaderTime() {
      const el = document.getElementById('header-datetime');
      if (!el) return;
      const now = new Date();
      const d  = now.getDate();
      const mo = now.toLocaleDateString('en-GB', { month: 'short' });
      const y  = now.getFullYear();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      el.textContent = `${d} ${mo} ${y}  ${hh}:${mm}:${ss}`;
    }
    updateHeaderTime();
    setInterval(updateHeaderTime, 1000);

    /* ============================================================
       HEADER: ALARM
    ============================================================ */
    let alarmTime     = null;
    let alarmInterval = null;
    let isRinging     = false;

    document.getElementById('header-datetime').addEventListener('click', () => {
      if (isRinging) { stopAlarm(); return; }
      let popup = document.getElementById('alarm-popup');
      if (popup) { popup.remove(); return; }
      popup = document.createElement('div');
      popup.className = 'alarm-popup';
      popup.id = 'alarm-popup';
      popup.innerHTML = `
        <h4>Set Alarm</h4>
        <input type="time" id="alarm-time-input" />
        <button id="set-alarm-btn">Set Alarm</button>
        <button id="cancel-alarm-btn" style="background:var(--chrome-border);margin-top:4px">Cancel</button>`;
      document.body.appendChild(popup);
      const now = new Date();
      document.getElementById('alarm-time-input').value =
        `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      document.getElementById('set-alarm-btn').addEventListener('click', () => {
        const t = document.getElementById('alarm-time-input').value;
        if (t) { setAlarm(t); popup.remove(); }
      });
      document.getElementById('cancel-alarm-btn').addEventListener('click', () => {
        clearAlarm(); popup.remove();
      });
    });

    function setAlarm(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      alarmTime = new Date();
      alarmTime.setHours(h, m, 0, 0);
      if (alarmTime <= new Date()) alarmTime.setDate(alarmTime.getDate() + 1);
      document.getElementById('header-datetime').classList.add('alarm-active');
      if (alarmInterval) clearInterval(alarmInterval);
      alarmInterval = setInterval(() => {
        if (alarmTime && new Date() >= alarmTime) triggerAlarm();
      }, 1000);
    }

    function triggerAlarm() {
      isRinging = true;
      const el = document.getElementById('header-datetime');
      el.classList.remove('alarm-active');
      el.classList.add('alarm-ringing');
      clearInterval(alarmInterval);
      alarmInterval = null;
    }

    function stopAlarm() {
      isRinging = false;
      const el = document.getElementById('header-datetime');
      el.classList.remove('alarm-ringing', 'alarm-active');
      alarmTime = null;
      if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
    }

    function clearAlarm() {
      document.getElementById('header-datetime').classList.remove('alarm-active');
      alarmTime = null;
      if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
    }

    /* ============================================================
       COLLAPSIBLE SECTIONS + KEYBOARD SHORTCUTS
    ============================================================ */
    document.querySelectorAll('.section-header').forEach(hdr =>
      hdr.addEventListener('click', () => hdr.closest('.command-section').classList.toggle('collapsed')));

    document.addEventListener('keydown', e => {
      const ctrl = e.ctrlKey || e.metaKey;
      if (ctrl && !e.shiftKey && e.key === 'f') { e.preventDefault(); document.getElementById('fitSiteBtn')?.click(); }
      if (ctrl && !e.shiftKey && e.key === 'g') { e.preventDefault(); document.getElementById('toggleGridBtn')?.click(); }
      if (ctrl && !e.shiftKey && e.key === 'z') { e.preventDefault(); showFeedback('Undo — coming soon'); }
      if (ctrl &&  e.shiftKey && e.key === 'Z') { e.preventDefault(); showFeedback('Redo — coming soon'); }
      if (e.key === 'Escape') { showFeedback('Ready'); }
    });

    /* ============================================================
       SCENE GLOBALS
    ============================================================ */
    const canvas    = document.getElementById('three-canvas');
    const container = canvas.parentElement;

    let currentMode      = '2d';
    let siteBoundaryLine = null;   // THREE.LineLoop  — orange site outline
    let terrainMesh      = null;   // THREE.Mesh      — elevation surface (terrain session)
    let gridHelper       = null;
    let axesHelper       = null;
    let feedbackTimer    = null;   // moved here to avoid temporal dead zone

    /* ============================================================
       RENDERER
    ============================================================ */
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();

    function syncViewportBackground() {
      const css = getComputedStyle(document.documentElement)
        .getPropertyValue('--vp-bgcolor').trim() || '#ffffff';
      renderer.setClearColor(new THREE.Color(css), 1.0);
    }
    syncViewportBackground();
    new MutationObserver(syncViewportBackground)
      .observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    /* ============================================================
       CAMERAS
    ============================================================ */
    // 3D — perspective
    const camera3D = new THREE.PerspectiveCamera(45, 2, 0.1, 10000);
    camera3D.position.set(100, 100, 100);

    // 2D — orthographic top-down
    const camera2D = new THREE.OrthographicCamera(-50, 50, 50, -50, 0.1, 10000);
    camera2D.position.set(0, 500, 0);
    camera2D.lookAt(0, 0, 0);

    let camera = camera2D; // start in 2D

    /* ============================================================
       CONTROLS
    ============================================================ */
    const controls3D = new OrbitControls(camera3D, renderer.domElement);
    controls3D.enableDamping     = true;
    controls3D.dampingFactor     = 0.08;
    controls3D.rotateSpeed       = 0.6;
    controls3D.zoomSpeed         = 0.8;
    controls3D.panSpeed          = 1.0;
    controls3D.screenSpacePanning = true;
    controls3D.minDistance       = 1;
    controls3D.maxDistance       = 5000;
    controls3D.minPolarAngle     = 0.01;
    controls3D.maxPolarAngle     = Math.PI * 0.85;
    controls3D.mouseButtons      = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };
    controls3D.touches           = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

    const controls2D = new OrbitControls(camera2D, renderer.domElement);
    controls2D.enableRotate      = false;
    controls2D.enableDamping     = true;
    controls2D.dampingFactor     = 0.08;
    controls2D.screenSpacePanning = true;
    controls2D.minZoom           = 0.05;
    controls2D.maxZoom           = 50;
    controls2D.mouseButtons      = { LEFT: THREE.MOUSE.PAN, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };

    let controls = controls2D; // matches starting camera

    /* ============================================================
       LIGHTS
    ============================================================ */
    const keyLight    = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(2, 4, 3);
    const fillLight   = new THREE.DirectionalLight(0xffffff, 0.4);
    fillLight.position.set(-3, 2, -2);
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(keyLight, fillLight, ambientLight);

    /* ============================================================
       GRID + AXES HELPERS
    ============================================================ */
    function updateSceneHelpers(siteSpan) {
      if (gridHelper) { scene.remove(gridHelper); gridHelper.geometry?.dispose(); gridHelper = null; }
      if (axesHelper) { scene.remove(axesHelper); axesHelper = null; }

      // Grid is always large enough that the user can never zoom out to its edge.
      // 10,000m covers any realistic urban site at any zoom level.
      const gridSize = 10000;

      // Cell size scales with site: round-metre intervals, ~100 visible cells across site
      const rawCell  = siteSpan / 100;
      const cellSize = rawCell < 1 ? 1 : rawCell < 2 ? 2 : rawCell < 5 ? 5 : 10;
      const divisions = gridSize / cellSize;

      gridHelper = new THREE.GridHelper(gridSize, divisions, 0x7a8a5a, 0x8a9b6f);
      gridHelper.visible = (currentMode === '2d');
      scene.add(gridHelper);

      axesHelper = new THREE.AxesHelper(siteSpan * 0.08);
      scene.add(axesHelper);
    }
    updateSceneHelpers(100); // default until site loads

    /* ============================================================
       GEO UTILITIES
    ============================================================ */
    // Equirectangular projection: lon/lat → local metres (Y=0 plane)
    // Three.js convention: X = East, Z = South (negated lat offset)
    function latlonToMetres(lon, lat, cLon, cLat) {
      const x =  (lon - cLon) * Math.cos(cLat * Math.PI / 180) * 111320;
      const z = -(lat - cLat) * 111320;
      return [x, z];
    }

    function extractCoordinates(geojson) {
      const features = geojson.features || [geojson];
      for (const f of features) {
        const g = f.geometry || f;
        if (g.type === 'Polygon')      return g.coordinates[0];
        if (g.type === 'MultiPolygon') return g.coordinates[0][0];
      }
      return null;
    }

    function computeBBox(coords) {
      const lons = coords.map(c => c[0]);
      const lats = coords.map(c => c[1]);
      return {
        west:  Math.min(...lons), east:  Math.max(...lons),
        south: Math.min(...lats), north: Math.max(...lats),
        cLon: (Math.min(...lons) + Math.max(...lons)) / 2,
        cLat: (Math.min(...lats) + Math.max(...lats)) / 2,
      };
    }

    function computePolygonArea(coords) {
      const bbox = computeBBox(coords);
      const pts  = coords.map(c => latlonToMetres(c[0], c[1], bbox.cLon, bbox.cLat));
      let area = 0;
      for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
        area += (pts[j][0] + pts[i][0]) * (pts[j][1] - pts[i][1]);
      }
      return Math.abs(area / 2);
    }

    function computePolygonPerimeter(coords) {
      const bbox = computeBBox(coords);
      let perim = 0;
      for (let i = 0; i < coords.length - 1; i++) {
        const [x1, z1] = latlonToMetres(coords[i][0],   coords[i][1],   bbox.cLon, bbox.cLat);
        const [x2, z2] = latlonToMetres(coords[i+1][0], coords[i+1][1], bbox.cLon, bbox.cLat);
        perim += Math.hypot(x2 - x1, z2 - z1);
      }
      return perim;
    }

    /* ============================================================
       SITE BOUNDARY DRAWING
    ============================================================ */
    function drawSiteBoundary(coords) {
      suppressResize = true; // prevent ResizeObserver firing during DOM updates
      // Remove any existing boundary
      if (siteBoundaryLine) {
        scene.remove(siteBoundaryLine);
        siteBoundaryLine.geometry.dispose();
        siteBoundaryLine = null;
      }

      const bbox = computeBBox(coords);

      // Build boundary line — flat at Y=0 for now; terrain will lift it later
      const points = coords.map(c => {
        const [x, z] = latlonToMetres(c[0], c[1], bbox.cLon, bbox.cLat);
        return new THREE.Vector3(x, 0, z);
      });

      const geom = new THREE.BufferGeometry().setFromPoints(points);
      const mat  = new THREE.LineBasicMaterial({ color: 0xff6600, linewidth: 2 });
      siteBoundaryLine = new THREE.LineLoop(geom, mat);
      scene.add(siteBoundaryLine);

      // Compute extents for camera framing
      const box    = new THREE.Box3().setFromObject(siteBoundaryLine);
      const size   = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);
      const siteSpan = Math.max(size.x, size.z);

      fit2DCamera(box);
      updateSceneHelpers(siteSpan); // grid now reads correct frustum from fit2DCamera
      switchMode('2d');

      // Update properties panel
      const area      = computePolygonArea(coords);
      const perimeter = computePolygonPerimeter(coords);
      document.getElementById('empty-props').style.display       = 'none';
      document.getElementById('site-info-section').style.display = 'block';
      document.getElementById('gpr-section').style.display       = 'block';
      document.getElementById('site-area').textContent           = area.toFixed(0) + ' m²';
      document.getElementById('site-perimeter').textContent      = perimeter.toFixed(0) + ' m';
      document.getElementById('site-points').textContent         = coords.length - 1;
      document.getElementById('clearSiteBtn').style.display      = 'block';
      document.getElementById('left-panel').classList.add('site-imported');

      suppressResize = false; // re-enable resize handling
      showFeedback(`Site loaded — ${coords.length - 1} points, ${area.toFixed(0)} m²`);
    }

    /* ============================================================
       CAMERA FIT HELPERS
    ============================================================ */
    function fit2DCamera(box) {
      const size   = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const aspect    = container.clientWidth / (container.clientHeight || 1);
      const siteW     = size.x * 1.3;  // required horizontal span
      const siteH     = size.z * 1.3;  // required vertical span

      // Choose the frustum half-height that fits both dimensions
      // If fitting by width: halfH = siteW / (2 * aspect)
      // If fitting by height: halfH = siteH / 2
      // Take the larger to guarantee everything is visible
      const halfH = Math.max(siteW / (2 * aspect), siteH / 2);

      camera2D.left   = -halfH * aspect;
      camera2D.right  =  halfH * aspect;
      camera2D.top    =  halfH;
      camera2D.bottom = -halfH;
      camera2D.updateProjectionMatrix();
      controls2D.target.set(center.x, 0, center.z);
      controls2D.update();
    }

    function fit3DCamera(box) {
      const size   = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const dist = Math.max(size.x, size.y, size.z) * 1.5;
      camera3D.position.set(center.x + dist * 0.7, dist, center.z + dist * 0.7);
      camera3D.near = Math.max(0.1, dist * 0.01);
      camera3D.far  = dist * 20;
      camera3D.updateProjectionMatrix();
      controls3D.target.copy(center);
      controls3D.update();
    }

    /* ============================================================
       MODE SWITCHING (2D <-> 3D)
    ============================================================ */
    function switchMode(mode) {
      currentMode = mode;

      document.querySelectorAll('.mode-btn').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.mode === mode));

      if (mode === '2d') {
        camera   = camera2D;
        controls = controls2D;
        if (gridHelper) gridHelper.visible = true;
        document.getElementById('status-mode').textContent = '2D';
        showFeedback('2D Plan View');
      } else {
        camera   = camera3D;
        controls = controls3D;
        if (gridHelper) gridHelper.visible = false;
        if (siteBoundaryLine) {
          fit3DCamera(new THREE.Box3().setFromObject(siteBoundaryLine));
        }
        document.getElementById('status-mode').textContent = '3D';
        showFeedback('3D View');
      }
    }

    document.querySelectorAll('.mode-btn').forEach(btn =>
      btn.addEventListener('click', () => switchMode(btn.dataset.mode)));

    // Start in 2D
    switchMode('2d');

    /* ============================================================
       RESIZE
    ============================================================ */
    // Guard: true while drawSiteBoundary is running — suppresses spurious
    // ResizeObserver callbacks triggered by DOM changes during site load.
    let suppressResize = false;

    let resizeRAF = null;
    function resizeToContainer() {
      if (suppressResize) return;
      // Debounce — only execute on the trailing edge of rapid calls
      if (resizeRAF) cancelAnimationFrame(resizeRAF);
      resizeRAF = requestAnimationFrame(() => {
        resizeRAF = null;
        const w = container.clientWidth  || 1;
        const h = container.clientHeight || 1;
        renderer.setSize(w, h, false);

        camera3D.aspect = w / h;
        camera3D.updateProjectionMatrix();

        const aspect = w / h;
        const halfH  = (camera2D.top - camera2D.bottom) / 2 || 50;
        camera2D.left   = -halfH * aspect;
        camera2D.right  =  halfH * aspect;
        camera2D.updateProjectionMatrix();

        if (siteBoundaryLine) {
          fit2DCamera(new THREE.Box3().setFromObject(siteBoundaryLine));
        }
      });
    }
    new ResizeObserver(resizeToContainer).observe(container);
    requestAnimationFrame(() => requestAnimationFrame(resizeToContainer));

    /* ============================================================
       ANIMATION LOOP
    ============================================================ */
    (function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    })();

    /* ============================================================
       PANEL COLLAPSE
    ============================================================ */
    document.querySelectorAll('.collapse-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const panelId = btn.dataset.panel;
        const panel   = document.getElementById(`${panelId}-panel`);
        panel.classList.toggle('collapsed');
        btn.textContent = panel.classList.contains('collapsed')
          ? (panelId === 'left' ? '►' : '◄')
          : (panelId === 'left' ? '◄' : '►');
      });
    });

    /* ============================================================
       FEEDBACK / STATUS BAR
    ============================================================ */
    function showFeedback(message, duration = 3000) {
      const el = document.getElementById('status-message');
      if (!el) return;
      el.textContent = message;
      if (feedbackTimer) clearTimeout(feedbackTimer);
      if (duration > 0) feedbackTimer = setTimeout(() => { el.textContent = 'Ready'; }, duration);
    }

    /* ============================================================
       GEOJSON IMPORT
    ============================================================ */
    document.getElementById('importGeoJSONBtn').addEventListener('click', () =>
      document.getElementById('geojsonFileInput').click());

    document.getElementById('geojsonFileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const geojson = JSON.parse(ev.target.result);
          const coords  = extractCoordinates(geojson);
          if (!coords || coords.length < 3) {
            showFeedback('Error: No valid polygon found in GeoJSON'); return;
          }
          drawSiteBoundary(coords);
        } catch {
          showFeedback('Error: Could not parse GeoJSON file');
        }
      };
      reader.readAsText(file);
      e.target.value = ''; // allow re-import of same file
    });

    document.getElementById('clearSiteBtn').addEventListener('click', () => {
      if (siteBoundaryLine) {
        scene.remove(siteBoundaryLine);
        siteBoundaryLine.geometry.dispose();
        siteBoundaryLine = null;
      }
      if (terrainMesh) {
        scene.remove(terrainMesh);
        terrainMesh.geometry.dispose();
        terrainMesh = null;
      }
      document.getElementById('left-panel').classList.remove('site-imported');
      document.getElementById('clearSiteBtn').style.display       = 'none';
      document.getElementById('site-info-section').style.display  = 'none';
      document.getElementById('gpr-section').style.display        = 'none';
      document.getElementById('empty-props').style.display        = 'block';
      showFeedback('Site cleared');
    });

    /* ============================================================
       VIEW CONTROLS
    ============================================================ */
    document.getElementById('fitSiteBtn').addEventListener('click', () => {
      if (!siteBoundaryLine) { showFeedback('No site loaded'); return; }
      const box = new THREE.Box3().setFromObject(siteBoundaryLine);
      if (currentMode === '2d') fit2DCamera(box); else fit3DCamera(box);
      showFeedback('Fitted to site');
    });

    document.getElementById('resetCameraBtn').addEventListener('click', () => {
      if (currentMode === '2d') {
        camera2D.position.set(0, 500, 0);
        camera2D.lookAt(0, 0, 0);
        controls2D.target.set(0, 0, 0);
        controls2D.update();
      } else {
        camera3D.position.set(100, 100, 100);
        camera3D.lookAt(0, 0, 0);
        controls3D.target.set(0, 0, 0);
        controls3D.update();
      }
      showFeedback('Camera reset');
    });

    document.getElementById('toggleGridBtn').addEventListener('click', () => {
      if (gridHelper) {
        gridHelper.visible = !gridHelper.visible;
        showFeedback('Grid ' + (gridHelper.visible ? 'on' : 'off'));
      }
    });

    /* ============================================================
       PLACEHOLDER BUTTONS
    ============================================================ */
    document.getElementById('importImageBtn')?.addEventListener('click',      () => showFeedback('Image underlay — coming soon'));
    document.getElementById('setScaleBtn')?.addEventListener('click',         () => showFeedback('Set Scale — coming soon'));
    document.getElementById('setNorthBtn')?.addEventListener('click',         () => showFeedback('Set North — coming soon'));
    document.getElementById('plantLibraryBtn')?.addEventListener('click',     () => showFeedback('Plant Library — coming soon'));
    document.getElementById('clearPlantsBtn')?.addEventListener('click',      () => showFeedback('No plants to clear'));
    document.getElementById('componentLibraryBtn')?.addEventListener('click', () => showFeedback('Component Library — coming soon'));
    document.getElementById('generateReportBtn')?.addEventListener('click',   () => showFeedback('GPR Report — coming soon'));

    // Drawing tool buttons
    document.querySelectorAll('.tool-btn').forEach(btn =>
      btn.addEventListener('click', () => showFeedback(`Tool: ${btn.dataset.action} — coming soon`)));

    // Menu bar items
    document.querySelectorAll('.dropdown-menu a').forEach(a =>
      a.addEventListener('click', e => {
        e.preventDefault();
        const action = a.dataset.action;
        if      (action === 'fit-site')    document.getElementById('fitSiteBtn')?.click();
        else if (action === 'toggle-grid') document.getElementById('toggleGridBtn')?.click();
        else    showFeedback(`${action} — coming soon`);
      }));

    showFeedback('GPRTool ready', 2000);
  </script>
</body>
</html>
