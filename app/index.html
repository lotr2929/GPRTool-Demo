<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPRTool</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="styles.css" />
  <!-- CesiumJS 1.115 — must load before ES modules -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <script type="importmap">
  {
    "imports": {
      "three": "./js/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="header-container"></div>
  <div id="body-container"></div>

  <!-- JSZip — must load before ES modules so window.JSZip is available to gpr-file.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <!-- three-mesh-bvh — patches THREE.BufferGeometry with computeBoundsTree() for fast raycasting -->
  <script src="https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.7.8/build/index.umd.js"></script>
  <script>
    // Patch Three.js raycasting globally once BVH library is loaded
    if (window.MeshBVHLib) {
      const { computeBoundsTree, disposeBoundsTree, acceleratedRaycast } = window.MeshBVHLib;
      // These will be applied after Three.js module loads — terrain.js calls computeBoundsTree()
      window._bvhPatch = { computeBoundsTree, disposeBoundsTree, acceleratedRaycast };
    }
  </script>

  <!-- GPRTool application -->
  <script type="module" src="./js/app.js"></script>

  <!-- Plant Library Modal — HTML template, controlled by plants module -->
<div id="plant-modal-overlay">
    <div id="plant-modal">
      <div id="plant-modal-header">
        <h3>Plant Library &mdash; Free Tier (56 species)</h3>
        <button id="plant-modal-close" title="Close">&#x2715;</button>
      </div>
      <div id="plant-modal-toolbar">
        <input type="text" id="plant-search" placeholder="Search by name or species&hellip;" autocomplete="off">
        <select id="plant-filter">
          <option value="all">All types</option>
          <option value="ground">Ground</option>
          <option value="roof">Roof</option>
          <option value="wall">Wall</option>
          <option value="sloped">Sloped</option>
          <option value="bamboo">Bamboo</option>
        </select>
      </div>
      <div id="plant-list"></div>
      <div id="plant-modal-footer">
        <span id="plant-modal-status">Select a surface, then choose a species.</span>
        <button id="plant-assign-btn" disabled>Add to Surface</button>
      </div>
    </div>
  </div>

</body>
</html>
